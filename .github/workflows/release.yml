name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Release quality gates
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          ruff check intel620 scripts BootUp.py GPU.py
          mypy intel620 scripts

      - name: Prepare release metadata
        id: prepare
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          python scripts/release/prepare_release.py --github-output "$env:GITHUB_OUTPUT"

      - name: Stop if no release commit found
        if: steps.prepare.outputs.release_created != 'true'
        run: echo "No releasable commits; exiting without tag/release."

      - name: Build docs
        if: steps.prepare.outputs.release_created == 'true'
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          sphinx-build -b html docs/source docs/build/html

      - name: Build Python packages
        if: steps.prepare.outputs.release_created == 'true'
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m build

      - name: Build Windows executables (PyInstaller)
        if: steps.prepare.outputs.release_created == 'true'
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          python scripts/build_windows.py

      - name: Commit release files
        if: steps.prepare.outputs.release_created == 'true'
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md README.md
          git commit -m "chore(release): v${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Create annotated tag
        if: steps.prepare.outputs.release_created == 'true'
        env:
          TAG: ${{ steps.prepare.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.prepare.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.prepare.outputs.tag }}
        shell: pwsh
        run: |
          $lines = Get-Content CHANGELOG.md
          $capture = $false
          $out = @()
          foreach ($line in $lines) {
            if ($line -match "^## $TAG - ") { $capture = $true }
            elseif ($capture -and $line -match "^## v") { break }
            if ($capture) { $out += $line }
          }
          $out | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8
          gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md dist/* docs/build/html/*

      - name: Publish to PyPI (optional)
        if: steps.prepare.outputs.release_created == 'true' && vars.PUBLISH_TO_PYPI == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
