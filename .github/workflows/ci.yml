name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-and-build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          ruff check intel620 scripts BootUp.py GPU.py

      - name: Mypy
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          mypy intel620 scripts

      - name: Build Windows executables (PyInstaller)
        shell: pwsh
        run: |
          .\.venv\Scripts\Activate.ps1
          python scripts/build_windows.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: dist/
          if-no-files-found: error
