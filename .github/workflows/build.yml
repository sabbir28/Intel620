name: Build and Release Windows Executables

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install nuitka ordered-set zstandard

      - name: Build portable onefile executable (Nuitka)
        shell: powershell
        run: |
          python -m nuitka main.py `
            --standalone `
            --onefile `
            --follow-imports `
            --assume-yes-for-downloads `
            --windows-disable-console `
            --msvc=latest `
            --lto=yes `
            --python-flag=-O `
            --python-flag=no_site `
            --output-dir=build/portable `
            --output-filename=Intel620-portable.exe `
            --remove-output

      - name: Build normal standalone directory (Nuitka)
        shell: powershell
        run: |
          python -m nuitka main.py `
            --standalone `
            --follow-imports `
            --assume-yes-for-downloads `
            --windows-disable-console `
            --msvc=latest `
            --lto=yes `
            --python-flag=-O `
            --python-flag=no_site `
            --output-dir=build/normal `
            --remove-output

      - name: Strip symbols where available
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null

          $portableExe = Resolve-Path 'build/portable/Intel620-portable.exe'
          Copy-Item $portableExe artifacts/Intel620-portable.exe -Force

          $standaloneDir = Get-ChildItem build/normal -Directory | Where-Object { $_.Name -like '*.dist' } | Select-Object -First 1
          if (-not $standaloneDir) {
            throw 'Nuitka standalone output directory (*.dist) was not found.'
          }

          $stripTool = $null
          if (Get-Command llvm-strip -ErrorAction SilentlyContinue) {
            $stripTool = 'llvm-strip'
          } elseif (Get-Command strip -ErrorAction SilentlyContinue) {
            $stripTool = 'strip'
          }

          if ($stripTool) {
            & $stripTool artifacts/Intel620-portable.exe
            Get-ChildItem $standaloneDir.FullName -Filter *.exe -Recurse | ForEach-Object { & $stripTool $_.FullName }
            Get-ChildItem $standaloneDir.FullName -Filter *.dll -Recurse | ForEach-Object { & $stripTool $_.FullName }
          } else {
            Write-Host 'No strip utility found; continuing without symbol stripping.'
          }

          Compress-Archive -Path "$($standaloneDir.FullName)\*" -DestinationPath artifacts/Intel620-standalone.zip -Force

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          $standaloneDir = Get-ChildItem build/normal -Directory | Where-Object { $_.Name -like '*.dist' } | Select-Object -First 1
          if (-not $standaloneDir) {
            throw 'Nuitka standalone output directory (*.dist) was not found.'
          }

          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" `
            /DAPP_DIR="$($standaloneDir.FullName)" `
            /DVERSION="$version" `
            /DOUT_FILE="$PWD\artifacts\Intel620-setup-$version.exe" `
            installer.nsi

      - name: Generate SHA-256 checksums
        shell: powershell
        run: |
          Get-ChildItem artifacts -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower()) *$($_.Name)" | Out-File -Append -Encoding ascii artifacts/SHA256SUMS.txt
          }

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Intel620-portable.exe
            artifacts/Intel620-standalone.zip
            artifacts/Intel620-setup-*.exe
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
